name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install ruff
        run: pip install ruff
      - name: Ruff lint check
        run: ruff check sdk/python/
      - name: Ruff format check
        run: ruff format --check sdk/python/

  sdk-tests:
    name: SDK Tests
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install SDK
        run: pip install -e "sdk/python[dev]"
      - name: Run SDK tests
        run: pytest sdk/python/tests/ -v --tb=short

  dashboard-typecheck:
    name: Dashboard Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - uses: pnpm/action-setup@v5
        with:
          version: 10
      - name: Install dependencies
        working-directory: Dashboard
        run: pnpm install --frozen-lockfile
      - name: Typecheck
        working-directory: Dashboard
        run: pnpm --filter web typecheck
